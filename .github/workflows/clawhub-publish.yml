name: Publish to ClawHub

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Authenticate ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/Library/Application Support/clawhub" 2>/dev/null || mkdir -p "$HOME/.config/clawhub"
          CONFIG_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/clawhub"
          mkdir -p "$CONFIG_DIR"
          echo "{\"token\":\"$CLAWHUB_TOKEN\"}" > "$CONFIG_DIR/config.json"

      - name: Publish skill
        run: clawhub publish .
